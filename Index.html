<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nova Forma | Cadastro</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{background:#0A0A0A;color:#F5E6A8;overflow-x:hidden;}

.hero{
background:linear-gradient(135deg,#000,#111);
min-height:100vh;
}

.glass{
background:rgba(20,20,20,.95);
backdrop-filter:blur(20px);
border:1px solid rgba(212,175,55,.15);
}

.input{
width:100%;
padding:15px;
border:1px solid rgba(212,175,55,.25);
border-radius:14px;
background:#111;
color:#F5E6A8;
}

.input:focus{
outline:none;
border-color:#D4AF37;
box-shadow:0 0 0 4px rgba(212,175,55,.15);
}

.btn-primary{
background:#D4AF37;
color:#000;
padding:14px 28px;
border-radius:14px;
font-weight:600;
}

.progress-container{
height:10px;
background:#1A1A1A;
border-radius:999px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:14%;
background:linear-gradient(90deg,#D4AF37,#F5E6A8);
transition:.4s;
}

.step{display:none;}
.step.active{display:block;}

.logo-circle{
width:90px;height:90px;
background:#D4AF37;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-size:2rem;
font-weight:800;
color:#000;
}
</style>

</head>

<body>

<section class="hero flex items-center justify-center p-6">

<div class="w-full max-w-5xl glass p-8 rounded-3xl">

<div class="text-center mb-10">
<div class="logo-circle">✠</div>
<h1 class="text-5xl font-bold mt-6">Nova Forma</h1>
<p>Cadastro Oficial da Comunidade</p>
</div>

<div class="progress-container mb-6">
<div id="progressBar" class="progress-bar"></div>
</div>

<form id="formNovaForma">

<!-- ETAPAS SIMPLIFICADAS -->
<div class="step active">
<h2>Dados Pessoais</h2>

<input id="nome" class="input mt-4" placeholder="Nome">
<input id="telefone" class="input mt-4" placeholder="WhatsApp">
<input id="email" class="input mt-4" placeholder="Email">

<button type="button" onclick="nextStep()" class="btn-primary mt-6">Continuar</button>
</div>

<div class="step">
<h2>Paróquia</h2>

<input id="paroquia" class="input mt-4">
<input id="cidade" class="input mt-4">

<div class="flex justify-between mt-6">
<button type="button" onclick="prevStep()" class="border px-4 py-2 rounded">Voltar</button>
<button type="button" onclick="nextStep()" class="btn-primary">Continuar</button>
</div>
</div>

<div class="step">
<h2>Objetivo</h2>

<textarea id="objetivo" class="input mt-4"></textarea>

<div class="flex justify-between mt-6">
<button type="button" onclick="prevStep()" class="border px-4 py-2 rounded">Voltar</button>
<button type="submit" class="btn-primary">Finalizar</button>
</div>
</div>

</form>

<div id="successScreen" class="hidden text-center mt-10">
<h2 class="text-3xl">Cadastro enviado 🙏</h2>
</div>

</div>

</section>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyC3EW2c03L6e6R0rXomRlkLF11uagDtw0",
  authDomain: "formularionovaforma.firebaseapp.com",
  projectId: "formularionovaforma",
  storageBucket: "formularionovaforma.appspot.com",
  messagingSenderId: "689160417440",
  appId: "1:689160417440:web:b4a3e01cf77901c0fa99c5",
  measurementId: "G-8DRCL7HD39"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// STEPS
let currentStep = 0;
const steps = document.querySelectorAll(".step");
const progressBar = document.getElementById("progressBar");

function showStep(i){
steps.forEach(s=>s.classList.remove("active"));
steps[i].classList.add("active");
progressBar.style.width = ((i+1)/steps.length)*100 + "%";
}

function nextStep(){
if(currentStep < steps.length-1){
currentStep++;
showStep(currentStep);
}
}

function prevStep(){
if(currentStep > 0){
currentStep--;
showStep(currentStep);
}
}

// FORM
const form = document.getElementById("formNovaForma");

form.addEventListener("submit", async function(e){
e.preventDefault();

const dados = {
nome: nome.value,
telefone: telefone.value,
email: email.value,
paroquia: paroquia.value,
cidade: cidade.value,
objetivo: objetivo.value,
dataCadastro: new Date().toISOString()
};

try {
await db.collection("membros").add(dados);

document.getElementById("formNovaForma").style.display = "none";
document.getElementById("successScreen").classList.remove("hidden");

console.log("Salvo no Firebase!");
} catch(err){
console.error("Erro:", err);
}
});

</script>

</body>
</html>
